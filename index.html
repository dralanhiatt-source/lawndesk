<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LawnDesk — Mowing by Cody</title>
<style>
:root{--bg:#071a07;--s1:#0d2410;--s2:#112b14;--bdr:#1a3d1a;--grn:#16a34a;--grn2:#4ade80;--txt:#f0fdf4;--txt2:#bbf7d0;--txt3:#6b7280;--red:#ef4444;--yel:#eab308;--blu:#3b82f6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;min-height:100vh;}
#pin{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
.p-logo{font-size:52px;}
.p-title{font-size:26px;font-weight:700;}
.p-sub{font-size:13px;color:var(--txt3);}
.p-dots{display:flex;gap:12px;}
.p-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--grn);transition:.2s;}
.p-dot.on{background:var(--grn);}
.p-err{color:var(--red);font-size:13px;height:16px;}
.p-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px;}
.p-key{height:60px;border-radius:10px;border:1px solid var(--bdr);background:var(--s1);color:var(--txt);font-size:20px;font-weight:600;cursor:pointer;transition:.15s;}
.p-key:hover{background:var(--s2);border-color:var(--grn);}
#app{display:none;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:100;background:var(--s1);border-bottom:1px solid var(--bdr);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:17px;font-weight:700;color:var(--grn2);}
.tb-acts{display:flex;gap:8px;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;}
.btn-p{background:var(--grn);color:#fff;}.btn-p:hover{background:#15803d;}
.btn-s{background:var(--s2);color:var(--txt2);border:1px solid var(--bdr);}.btn-s:hover{border-color:var(--grn);}
.btn-d{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-d:hover{background:rgba(239,68,68,.25);}
.btn-sm{padding:4px 9px;font-size:12px;}
.btn-ico{padding:7px;border-radius:8px;background:transparent;border:1px solid var(--bdr);color:var(--txt3);cursor:pointer;font-size:15px;}
.btn-ico:hover{border-color:var(--grn);color:var(--grn2);}
.nav{display:flex;gap:2px;padding:6px 12px;background:var(--s1);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.ntab{padding:6px 12px;border-radius:8px;border:none;background:transparent;color:var(--txt3);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.15s;}
.ntab.act{background:var(--grn);color:#fff;}
.ntab:hover:not(.act){background:var(--s2);color:var(--txt2);}
.content{padding:16px;max-width:1100px;margin:0 auto;}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:14px;}
.ctitle{font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:14px;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.scard{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center;}
.snum{font-size:26px;font-weight:700;color:var(--grn2);}
.slbl{font-size:11px;color:var(--txt3);margin-top:3px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 10px;color:var(--txt3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr);}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.bge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.bg-g{background:rgba(74,222,128,.15);color:#4ade80;}
.bg-y{background:rgba(234,179,8,.15);color:#eab308;}
.bg-r{background:rgba(239,68,68,.15);color:#ef4444;}
.bg-b{background:rgba(59,130,246,.15);color:#3b82f6;}
.bg-gr{background:rgba(107,114,128,.15);color:#9ca3af;}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.fgrp{display:flex;flex-direction:column;gap:5px;}
.fgrp label{font-size:12px;color:var(--txt3);font-weight:500;}
input,select,textarea{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);padding:8px 11px;font-size:13px;width:100%;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--grn);}
textarea{resize:vertical;min-height:72px;}
select option{background:var(--s2);}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.moverlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.mtitle{font-size:16px;font-weight:700;margin-bottom:18px;}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.empty{text-align:center;padding:40px 16px;color:var(--txt3);}
.eico{font-size:36px;margin-bottom:10px;}
.etitle{font-size:15px;font-weight:600;color:var(--txt2);margin-bottom:5px;}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.stitle{font-size:17px;font-weight:700;}
.acol{display:flex;gap:5px;flex-wrap:wrap;}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px;}
.al-g{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80;}
.al-y{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:#eab308;}
.pbar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:var(--grn);border-radius:3px;}
.cbars{display:flex;align-items:flex-end;gap:5px;height:110px;}
.cbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.cb{width:100%;background:var(--grn);border-radius:3px 3px 0 0;min-height:4px;}
.clbl{font-size:10px;color:var(--txt3);}
.tog{position:relative;width:38px;height:20px;}
.tog input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:var(--bdr);border-radius:10px;cursor:pointer;transition:.3s;}
.tsl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.tog input:checked+.tsl{background:var(--grn);}
.tog input:checked+.tsl:before{transform:translateX(18px);}
.togrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);}
@media(max-width:600px){.content{padding:10px;}.sgrid{grid-template-columns:repeat(2,1fr);}.fgrid{grid-template-columns:1fr;}}
</style>
</head>

<script>

const PIN='1234';

const gd=(k,d=[])=>{try{return JSON.parse(localStorage.getItem('ld_'+k))||d;}catch{return d;}};

    {id:5,fn:'Bob',ln:'Martinez',ph:'479-555-0505',em:'bob@email.com',ad:'777 Cedar Rd, Fayetteville AR',gc:'1234',mw:'Push Only',no:'Steep back yard'},

  const yd=new Date();yd.setDate(yd.getDate()-1);const yd2=yd.toISOString().split('T')[0];
  const tm=new Date();tm.setDate(tm.getDate()+1);const tm2=tm.toISOString().split('T')[0];
  sd('jobs',[

// ===== PIN =====
function pk(k){if(pb2.length>=4)return;pb2+=k;upd();if(pb2.length===4)setTimeout(chk,120);}
function pb(){pb2=pb2.slice(0,-1);upd();}
function upd(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('on',i<pb2.length);}
function chk(){
  if(pb2===PIN){
    document.getElementById('pin').style.display='none';
    document.getElementById('app').style.display='block';
    initDemo();st('dash');
  }else{
    document.getElementById('perr').textContent='Incorrect PIN';
    pb2='';upd();setTimeout(()=>document.getElementById('perr').textContent='',2000);
  }
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('pin').style.display!=='none'){
    if(e.key>='0'&&e.key<='9')pk(e.key);
    if(e.key==='Backspace')pb();
  }
});
function lock(){pb2='';upd();document.getElementById('pin').style.display='flex';document.getElementById('app').style.display='none';}

  document.querySelectorAll('.ntab').forEach((t,i)=>t.classList.toggle('act',TABS[i]===tab));

}

// ===== REPORTS =====
function rRep(){

  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);

    const rev=jobs.filter(j=>j.dt.startsWith(key)&&j.st==='completed').reduce((s,j)=>s+Number(j.pr),0);
    months.push({lb:d.toLocaleString('default',{month:'short'}),rev});

  const mx=Math.max(...months.map(m=>m.rev),1);
  const tr=jobs.filter(j=>j.st==='completed').reduce((s,j)=>s+Number(j.pr),0);
  const te=exps.reduce((s,e)=>s+Number(e.am),0);

  const top=custs.map(c=>({...c,rev:jobs.filter(j=>j.cid===c.id&&j.st==='completed').reduce((s,j)=>s+Number(j.pr),0)})).filter(c=>c.rev>0).sort((a,b)=>b.rev-a.rev).slice(0,5);

      <div class="scard"><div class="snum" style="color:${np>=0?'var(--grn2)':'var(--red)'}">$${np.toFixed(0)}</div><div class="slbl">Net Profit</div></div>
      <div class="scard"><div class="snum">${jobs.filter(j=>j.st==='completed').length}</div><div class="slbl">Jobs Done</div></div>
    </div>
    <div class="card"><div class="ctitle">📊 Monthly Revenue (last 6 months)</div>
      <div class="cbars">
        ${months.map(m=>`<div class="cbw">
          <div class="cb" style="height:${mx>0?Math.max((m.rev/mx)*100,4):4}px" title="$${m.rev}"></div>

    ${top.length?`<div class="card"><div class="ctitle">⭐ Top Customers</div>
      ${top.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)">
        <div style="flex:1"><strong>${c.fn} ${c.ln}</strong></div>
        <div style="width:180px"><div class="pbar"><div class="pfill" style="width:${(c.rev/top[0].rev)*100}%"></div></div></div>
        <div style="color:var(--grn2);font-weight:600;min-width:55px;text-align:right">$${c.rev}</div>

      <div style="display:grid;gap:7px;font-size:14px">
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr)"><span>Gross Revenue</span><strong style="color:var(--grn2)">$${tr.toFixed(2)}</strong></div>

  dlCSV(rows,'lawndesk-report.csv');
}
function prtrep(){
  const jobs=gd('jobs').filter(j=>j.st==='completed');
  const tr=jobs.reduce((s,j)=>s+Number(j.pr),0);
  const te=gd('expenses').reduce((s,e)=>s+Number(e.am),0);
  const tm=gd('mileage').reduce((s,m)=>s+Number(m.mi),0);
  const s=gd('settings',{bus:'Mowing by Cody'});
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>LawnDesk Report</title>
  <style>body{font-family:system-ui;max-width:700px;margin:40px auto;padding:20px}h2{color:#16a34a}
  table{width:100%;border-collapse:collapse;margin:14px 0}th{background:#f0fdf4;padding:8px;text-align:left}
  td{padding:8px;border-bottom:1px solid #e5e7eb}@media print{button{display:none}}</style></head><body>
  <h2>${s.bus} — LawnDesk Report</h2><p>${new Date().toLocaleDateString()}</p>
  <table><tr><td>Revenue</td><td><strong>$${tr.toFixed(2)}</strong></td></tr>
  <tr><td>Expenses</td><td>$${te.toFixed(2)}</td></tr>
  <tr><td>Mileage Deduction</td><td>$${(tm*0.70).toFixed(2)}</td></tr>
  <tr><td><strong>Net Profit</strong></td><td><strong>$${(tr-te-(tm*0.70)).toFixed(2)}</strong></td></tr></table>
  <h3>Completed Jobs</h3>
  <table><thead><tr><th>Date</th><th>Customer</th><th>Service</th><th>Amount</th></tr></thead><tbody>
  ${jobs.map(j=>{const c=gd('customers').find(x=>x.id===j.cid)||{fn:'?',ln:''};
    return`<tr><td>${j.dt}</td><td>${c.fn} ${c.ln}</td><td>${j.sv}</td><td>$${j.pr}</td></tr>`;}).join('')}
  </tbody></table>
  <button onclick="window.print()" style="padding:9px 18px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:16px">Print</button>
  </body></html>`);
}

document.querySelectorAll('.moverlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
